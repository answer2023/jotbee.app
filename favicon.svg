<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <clipPath id="c"><circle cx="32" cy="32" r="32"/></clipPath>
  </defs>
  <circle cx="32" cy="32" r="32" fill="#1A1208"/>
  <circle cx="32" cy="32" r="26" fill="#FAF5E9" stroke="#D4AF37" stroke-width="1.5"/>
  <!-- Bee body -->
  <ellipse cx="32" cy="30" rx="7" ry="9.5" fill="#FAF5E9" stroke="#D4AF37" stroke-width="1"/>
  <!-- Stripes -->
  <line x1="26" y1="27" x2="38" y2="27" stroke="#1A1208" stroke-width="1.2"/>
  <line x1="26" y1="30" x2="38" y2="30" stroke="#1A1208" stroke-width="1.2"/>
  <line x1="26" y1="33" x2="38" y2="33" stroke="#1A1208" stroke-width="1.2"/>
  <!-- Head -->
  <circle cx="32" cy="20" r="4" fill="#1A1208"/>
  <!-- Wings -->
  <ellipse cx="24" cy="25" rx="6" ry="3.5" fill="none" stroke="#D4AF37" stroke-width="0.8" transform="rotate(-20 24 25)"/>
  <ellipse cx="40" cy="25" rx="6" ry="3.5" fill="none" stroke="#D4AF37" stroke-width="0.8" transform="rotate(20 40 25)"/>
  <!-- Stinger/pencil -->
  <polygon points="30,39 34,39 32,45" fill="#D4AF37"/>
  <!-- Antennae -->
  <line x1="30" y1="17" x2="27" y2="13" stroke="#D4AF37" stroke-width="0.8" stroke-linecap="round"/>
  <circle cx="27" cy="13" r="1.2" fill="#D4AF37"/>
  <line x1="34" y1="17" x2="37" y2="13" stroke="#D4AF37" stroke-width="0.8" stroke-linecap="round"/>
  <circle cx="37" cy="13" r="1.2" fill="#D4AF37"/>
</svg>